{% extends "base.html" %}
{% block content %}

<h2>Inventory</h2>

<form method="POST" action="/inventory/add">
    <input name="name" placeholder="Item name" required>
    <input name="category" placeholder="Category" required>
    <input name="hsn" placeholder="HSN Code">
    <input name="unit" placeholder="Unit">
    <input name="price" type="number" step="0.01" placeholder="Price">
    <input name="gst" type="number" step="0.01" placeholder="GST %">
    <input name="quantity" type="number" placeholder="Quantity">
    <button type="submit">Add Item</button>
</form>

<table>
<tr>
    <th>Name</th>
    <th>Category</th>
    <th>Price</th>
    <th>GST</th>
    <th>Qty</th>
</tr>

{% for item in items %}
<tr>
    <td>{{ item.name }}</td>
    <td>{{ item.category }}</td>
    <td>{{ item.price }}</td>
    <td>{{ item.gst_rate }}</td>
    <td>{{ item.quantity }}</td>
</tr>
{% endfor %}
</table>

{% endblock %}
